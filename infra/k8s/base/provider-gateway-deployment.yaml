apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-gateway
  labels:
    app.kubernetes.io/name: provider-gateway
    app.kubernetes.io/component: provider
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-gateway
        app.kubernetes.io/component: provider
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provider-gateway
          image: app-provider-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - secretRef:
                name: provider-gateway-secrets
          env:
            - name: PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY
              value: 'true'
            - name: PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS
              value: 'true'
            - name: PROVIDER_GATEWAY_REVOCATION_DATABASE_PATH
              value: /var/lib/loop-provider/authority.sqlite3
            - name: PROVIDER_GATEWAY_EGRESS_PROXY_URL
              value: http://egress-proxy:8080
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: state
              mountPath: /var/lib/loop-provider
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
        - name: state
          persistentVolumeClaim:
            claimName: provider-gateway-state
