apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-gateway
  labels:
    app.kubernetes.io/name: browser-gateway
    app.kubernetes.io/component: browser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-gateway
        app.kubernetes.io/component: browser
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: true
      dnsPolicy: None
      dnsConfig:
        nameservers: ['127.0.0.1']
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: browser-gateway
          image: app-provider-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - secretRef:
                name: browser-gateway-secrets
          env:
            - name: PROVIDER_GATEWAY_SERVICE_NAME
              value: browser-gateway
            - name: PROVIDER_GATEWAY_AUTHORITY_AUDIENCE
              value: loop-browser-gateway
            - name: PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY
              value: 'true'
            - name: PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS
              value: 'true'
            - name: PROVIDER_GATEWAY_REQUIRE_SHARED_STATE
              value: 'true'
            - name: PROVIDER_GATEWAY_BROWSER_ENABLED
              value: 'true'
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '2'
              memory: 2Gi
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 1Gi }
