apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-gateway
  labels:
    app.kubernetes.io/name: calendar-gateway
    app.kubernetes.io/component: provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: calendar-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: calendar-gateway
        app.kubernetes.io/component: provider
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: true
      dnsPolicy: None
      dnsConfig:
        nameservers: ['127.0.0.1']
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: calendar-gateway
          image: app-api:latest
          imagePullPolicy: IfNotPresent
          command:
            ['uvicorn', 'app.provider_gateway.main:app', '--host', '0.0.0.0', '--port', '8090']
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - secretRef:
                name: calendar-gateway-secrets
          env:
            - name: PROVIDER_GATEWAY_SERVICE_NAME
              value: calendar-gateway
            - name: PROVIDER_GATEWAY_AUTHORITY_AUDIENCE
              value: loop-calendar-gateway
            - name: PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY
              value: 'true'
            - name: PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS
              value: 'true'
            - name: PROVIDER_GATEWAY_REQUIRE_SHARED_STATE
              value: 'true'
            - name: PROVIDER_GATEWAY_BROWSER_ENABLED
              value: 'false'
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
