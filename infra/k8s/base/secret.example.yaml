  SECRET_KEY: 'CHANGE_ME_shared_session_secret_at_least_32_bytes'
  DATABASE_URL: 'postgresql+asyncpg://app:CHANGE_ME@postgres:5432/app'
  API_TOKEN: 'CHANGE_ME_shared_random_token_at_least_32_bytes'
  AGENT_RECEIPT_SIGNING_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_MAKE_RECEIPT_KEYGEN_OUTPUT
    -----END PRIVATE KEY-----
---
