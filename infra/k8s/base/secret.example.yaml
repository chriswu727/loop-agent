# -----------------------------------------------------------------------------
# EXAMPLE ONLY. Do NOT commit real secrets. In production, generate secrets with
# Sealed Secrets, External Secrets Operator, or your cloud secret manager and
# keep this file out of Kustomize resources. Copy its shape into your secret
# manager; the base intentionally refuses to manufacture deployable credentials.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  SECRET_KEY: 'CHANGE_ME_shared_session_secret_at_least_32_bytes'
  DATABASE_URL: 'postgresql+asyncpg://app:CHANGE_ME@postgres:5432/app'
  API_TOKEN: 'CHANGE_ME_shared_random_token_at_least_32_bytes'
  AGENT_RECEIPT_SIGNING_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_MAKE_RECEIPT_KEYGEN_OUTPUT
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: web-secrets
type: Opaque
stringData:
  LOOP_SESSION_SECRET: 'CHANGE_ME_shared_session_secret_at_least_32_bytes'
  GITHUB_CLIENT_ID: 'CHANGE_ME'
  GITHUB_CLIENT_SECRET: 'CHANGE_ME'
