apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests shared by every environment. Overlays patch replicas, images,
# env, and namespace on top of these.
namespace: loop

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: loop
      app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - sandbox-rbac.yaml
  - data-pvc.yaml
  - egress-proxy-audit-pvc.yaml
  - email-gateway-state-pvc.yaml
  - calendar-gateway-state-pvc.yaml
  - vision-gateway-state-pvc.yaml
  - browser-gateway-state-pvc.yaml
  - configmap.yaml
  - api-deployment.yaml
  - api-service.yaml
  - api-hpa.yaml
  - api-pdb.yaml
  - web-deployment.yaml
  - web-service.yaml
  - web-hpa.yaml
  - web-pdb.yaml
  - worker-deployment.yaml
  - worker-hpa.yaml
  - email-gateway-deployment.yaml
  - email-gateway-service.yaml
  - calendar-gateway-deployment.yaml
  - calendar-gateway-service.yaml
  - vision-gateway-deployment.yaml
  - vision-gateway-service.yaml
  - browser-gateway-deployment.yaml
  - browser-gateway-service.yaml
  - egress-proxy-deployment.yaml
  - egress-proxy-service.yaml
  - ingress.yaml
  - networkpolicy.yaml
