name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api · ruff + mypy + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      # Install every extra so mypy type-checks the whole codebase (the calendar/
      # office libs are untyped; without them mypy's per-line ignores read as unused).
      - run: pip install -e ".[dev,office,calendar]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
      - name: Types (mypy)
        run: mypy app
      - name: Tests
        run: pytest -q
        # The suite is fully offline: in-memory SQLite + mocked tools. No services.

  web:
    name: web · lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No version here: it's read from the root package.json "packageManager"
      # field. Specifying both errors (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
