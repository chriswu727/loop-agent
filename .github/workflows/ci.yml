name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api · ruff + mypy + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install uv==0.11.15
      - name: Locked environment
        run: |
          uv lock --check
          uv export --quiet --frozen --no-dev --extra office --extra calendar --no-emit-project --format requirements.txt --output-file requirements.lock
          uv pip compile --quiet --universal --generate-hashes --python-version 3.12 sandbox-requirements.in --output-file sandbox-requirements.lock
          git diff --exit-code uv.lock requirements.lock sandbox-requirements.lock
          uv sync --frozen --all-extras
      - name: Lint (ruff)
        run: |
          uv run --frozen --all-extras ruff check .
          uv run --frozen --all-extras ruff format --check .
      - name: Types (mypy)
        run: uv run --frozen --all-extras mypy app
      - name: Tests
        run: uv run --frozen --all-extras pytest -q
        # The suite is fully offline: in-memory SQLite + mocked tools. No services.
      - name: Dependency audit
        run: uv run --frozen --all-extras pip-audit

  web:
    name: web · lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No version here: it's read from the root package.json "packageManager"
      # field. Specifying both errors (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --prod
