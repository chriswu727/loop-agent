name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api · ruff + mypy + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install uv==0.11.15
      - name: Locked environment
        run: |
          uv lock --check
          uv export --quiet --frozen --no-dev --extra office --extra calendar --no-emit-project --format requirements.txt --output-file requirements.lock
          uv pip compile --quiet --universal --generate-hashes --python-version 3.12 sandbox-requirements.in --output-file sandbox-requirements.lock
          git diff --exit-code uv.lock requirements.lock sandbox-requirements.lock
          uv sync --frozen --all-extras
      - name: Lint (ruff)
        run: |
          uv run --frozen --all-extras ruff check .
          uv run --frozen --all-extras ruff format --check .
      - name: Types (mypy)
        run: uv run --frozen --all-extras mypy app
      - name: Tests
        run: uv run --frozen --all-extras pytest --cov=app --cov-branch --cov-report=term --cov-fail-under=70 -q
        # The suite is fully offline: in-memory SQLite + mocked tools. No services.
      - name: Dependency audit
        run: uv run --frozen --all-extras pip-audit

  web:
    name: web · lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No version here: it's read from the root package.json "packageManager"
      # field. Specifying both errors (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --prod

  demo-acceptance:
    name: demo · fresh browser → verified Receipt replay
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pip install uv==0.11.15
      - run: pnpm install --frozen-lockfile
      - run: uv sync --frozen --extra dev
        working-directory: apps/api
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: demo-playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          if-no-files-found: ignore

  runtime-boundaries:
    name: runtime · locks + compose + kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/provider-gateway-runtime/package-lock.json
      - name: Locked Provider Gateway browser runtime
        working-directory: apps/provider-gateway-runtime
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev
      - name: Compose graph
        run: docker compose config -q
      - name: Kubernetes production boundary
        run: |
          kubectl kustomize infra/k8s/overlays/dev >/tmp/loop-k8s-dev.yaml
          kubectl kustomize infra/k8s/overlays/prod >/tmp/loop-k8s-prod.yaml
          kubectl kustomize infra/k8s/overlays/acceptance >/tmp/loop-k8s-acceptance.yaml
          grep -q 'name: email-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'name: calendar-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'name: vision-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'name: browser-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'name: egress-proxy' /tmp/loop-k8s-prod.yaml
          grep -q 'name: EGRESS_PROXY_REQUIRE_DURABLE_AUDIT' /tmp/loop-k8s-prod.yaml
          grep -q 'name: EGRESS_PROXY_REQUIRE_DURABLE_REVOCATIONS' /tmp/loop-k8s-prod.yaml
          grep -q 'name: EGRESS_PROXY_REQUIRE_SHARED_STATE' /tmp/loop-k8s-prod.yaml
          grep -q 'name: PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS' /tmp/loop-k8s-prod.yaml
          grep -q 'name: PROVIDER_GATEWAY_REQUIRE_SHARED_STATE' /tmp/loop-k8s-prod.yaml
          grep -q 'name: restrict-browser-gateway-egress' /tmp/loop-k8s-prod.yaml
          grep -q 'name: restrict-provider-gateways-egress' /tmp/loop-k8s-prod.yaml
          grep -q 'name: allow-redis-from-loop-runtimes' /tmp/loop-k8s-prod.yaml
          grep -q 'value: loop-email-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'value: loop-calendar-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'value: loop-vision-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'value: loop-browser-gateway' /tmp/loop-k8s-prod.yaml
          grep -q 'value: 80,443,587,993' /tmp/loop-k8s-prod.yaml
          grep -q 'loop.openai.com/egress: proxied' /tmp/loop-k8s-prod.yaml
          grep -q 'name: postgres' /tmp/loop-k8s-acceptance.yaml
          grep -q 'name: redis' /tmp/loop-k8s-acceptance.yaml
          grep -q 'name: allow-postgres-from-loop-runtimes' /tmp/loop-k8s-acceptance.yaml

  enforcement-acceptance:
    name: enforcement · Redis restart + worker recovery + revoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install uv==0.11.15
      - run: uv sync --frozen --extra dev
      - name: Acceptance harness
        run: bash ../../scripts/enforcement-acceptance.sh

  kubernetes-acceptance:
    name: kubernetes · deploy + task + rollback
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Install k3d
        run: |
          curl --fail --show-error --location --output /tmp/k3d \
            https://github.com/k3d-io/k3d/releases/download/v5.9.0/k3d-linux-amd64
          echo '06d8f25bc3a971c4eb29e0ff08429b180402db0f4dec838c9eac427e296800a0  /tmp/k3d' | sha256sum --check
          sudo install /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Disposable cluster acceptance
        run: bash scripts/k8s-deployment-acceptance.sh
