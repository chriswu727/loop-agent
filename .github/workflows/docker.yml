name: Build images

# Pull requests build every runtime without publishing. Tagged releases and
# manual runs additionally publish the verified images.
on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - '.github/workflows/docker.yml'
      - 'apps/api/**'
      - 'apps/provider-gateway-runtime/**'
      - 'apps/web/**'
      - 'infra/docker/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
            target: runtime
          - name: web
            dockerfile: infra/docker/web.Dockerfile
            target: runner
          - name: provider-gateway
            dockerfile: infra/docker/api.Dockerfile
            target: provider-gateway
          - name: sandbox
            dockerfile: apps/api/sandbox.Dockerfile
            target: ''
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
