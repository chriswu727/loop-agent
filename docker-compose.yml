# =============================================================================
# Local development stack. Mirrors the production topology (web -> api -> db/cache)
# so "works on my machine" matches "works in the cluster".
#   docker compose up --build
# Services are wired by name on a shared network; no host ports needed between them.
# =============================================================================
name: loop

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
      LOOP_API_TOKEN: ${API_TOKEN:-local-development-token-change-me}
      LOOP_SESSION_SECRET: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      WEB_AUTH_REQUIRED: ${WEB_AUTH_REQUIRED:-false}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - '${LOOP_WEB_PORT:-3000}:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: console
      # In the container topology the dedicated worker runs the loops.
      EXECUTION_MODE: worker
      AGENT_WORKSPACES_ROOT: /var/lib/loop/workspaces
      AGENT_MEMORY_ROOT: /var/lib/loop/memory
    ports:
      - '${LOOP_API_PORT:-8000}:8000'
    volumes:
      - ./apps/api:/app:ro
      - loopdata:/var/lib/loop
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    command: ['python', '-m', 'app.workers.worker']
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: console
      EXECUTION_MODE: worker
      AGENT_SANDBOX: 'off'
      AGENT_WORKSPACES_ROOT: /var/lib/loop/workspaces
      AGENT_MEMORY_ROOT: /var/lib/loop/memory
    volumes:
      - ./apps/api:/app:ro
      - loopdata:/var/lib/loop
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    command: ['alembic', 'upgrade', 'head']
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    volumes:
      - ./apps/api:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '${LOOP_POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${LOOP_REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  loopdata:
