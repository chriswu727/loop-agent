# =============================================================================
# Local development stack. Mirrors the production topology (web -> api -> db/cache)
# so "works on my machine" matches "works in the cluster".
#   docker compose up --build
# Services are wired by name on a shared network; no host ports needed between them.
# =============================================================================
name: loop

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_INTERNAL_URL: http://api:8000
      LOOP_API_TOKEN: ${API_TOKEN:-local-development-token-change-me}
      LOOP_SESSION_SECRET: ${SECRET_KEY:-change-me-in-production-use-openssl-rand-hex-32}
      WEB_AUTH_REQUIRED: ${WEB_AUTH_REQUIRED:-false}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - '${LOOP_WEB_PORT:-3000}:3000'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    env_file:
      - path: .env
        required: false
    user: '10001:10001'
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: console
      # In the container topology the dedicated worker runs the loops.
      EXECUTION_MODE: worker
      AGENT_WORKSPACES_ROOT: /var/lib/loop/workspaces
      AGENT_MEMORY_ROOT: /var/lib/loop/memory
      SMTP_HOST: ''
      SMTP_USER: ''
      SMTP_PASSWORD: ''
      IMAP_HOST: ''
      CALDAV_URL: ''
      CALDAV_USER: ''
      CALDAV_PASSWORD: ''
      PROVIDER_GATEWAY_GEMINI_API_KEY: ''
    ports:
      - '${LOOP_API_PORT:-8000}:8000'
    volumes:
      - ./apps/api:/app:ro
      - loopdata:/var/lib/loop
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      data-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    command: ['python', '-m', 'app.workers.worker']
    user: '10001:10001'
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: console
      EXECUTION_MODE: worker
      AGENT_SANDBOX: 'required'
      AGENT_SANDBOX_BACKEND: docker
      AGENT_DOCKER_WORKSPACE_VOLUME: '${COMPOSE_PROJECT_NAME:-loop}_loopdata'
      AGENT_DOCKER_WORKSPACE_MOUNT: /var/lib/loop
      AGENT_EMAIL_GATEWAY_URL: http://email-gateway:8090
      AGENT_CALENDAR_GATEWAY_URL: http://calendar-gateway:8090
      AGENT_VISION_GATEWAY_URL: http://vision-gateway:8090
      AGENT_EMAIL_EGRESS_HOSTS: ${AGENT_EMAIL_EGRESS_HOSTS:-}
      AGENT_CALENDAR_EGRESS_HOSTS: ${AGENT_CALENDAR_EGRESS_HOSTS:-}
      AGENT_VISION_EGRESS_HOSTS: ${AGENT_VISION_EGRESS_HOSTS:-generativelanguage.googleapis.com}
      AGENT_BROWSER_GATEWAY_URL: http://browser-gateway:8090
      AGENT_EGRESS_PROXY_URL: http://172.30.0.2:8080
      AGENT_EGRESS_PROXY_AUDIT_URL: http://egress-proxy:8081
      AGENT_EGRESS_DOCKER_NETWORK: '${COMPOSE_PROJECT_NAME:-loop}_sandbox-egress'
      AGENT_WORKSPACES_ROOT: /var/lib/loop/workspaces
      AGENT_MEMORY_ROOT: /var/lib/loop/memory
      SMTP_HOST: ''
      SMTP_USER: ''
      SMTP_PASSWORD: ''
      IMAP_HOST: ''
      CALDAV_URL: ''
      CALDAV_USER: ''
      CALDAV_PASSWORD: ''
      PROVIDER_GATEWAY_GEMINI_API_KEY: ''
    volumes:
      - ./apps/api:/app:ro
      - loopdata:/var/lib/loop
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      default:
      browser-egress:
      provider-egress:
    group_add:
      - '0'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      email-gateway:
        condition: service_healthy
      calendar-gateway:
        condition: service_healthy
      vision-gateway:
        condition: service_healthy
      browser-gateway:
        condition: service_healthy
      egress-proxy:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully
      data-init:
        condition: service_completed_successfully
    restart: unless-stopped

  data-init:
    image: alpine:3.22
    user: '0:0'
    command:
      [
        'chown',
        '-R',
        '10001:10001',
        '/var/lib/loop',
        '/var/lib/loop-egress',
        '/var/lib/loop-email',
        '/var/lib/loop-calendar',
        '/var/lib/loop-vision',
        '/var/lib/loop-browser',
      ]
    volumes:
      - loopdata:/var/lib/loop
      - egressaudit:/var/lib/loop-egress
      - emailstate:/var/lib/loop-email
      - calendarstate:/var/lib/loop-calendar
      - visionstate:/var/lib/loop-vision
      - browserstate:/var/lib/loop-browser
    restart: 'no'

  email-gateway:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    command: ['uvicorn', 'app.provider_gateway.main:app', '--host', '0.0.0.0', '--port', '8090']
    environment:
      PROVIDER_GATEWAY_SERVICE_NAME: email-gateway
      PROVIDER_GATEWAY_AUTHORITY_AUDIENCE: loop-email-gateway
      PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY: 'true'
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEY: ${AGENT_AUTHORITY_PUBLIC_KEY:-}
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEYS: ${AGENT_AUTHORITY_PUBLIC_KEYS:-{}}
      PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS: 'true'
      PROVIDER_GATEWAY_REVOCATION_DATABASE_PATH: /var/lib/loop-email/authority.sqlite3
      PROVIDER_GATEWAY_BROWSER_ENABLED: 'false'
      PROVIDER_GATEWAY_EGRESS_PROXY_URL: http://172.32.0.2:8080
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      EMAIL_FROM: ${EMAIL_FROM:-}
    volumes:
      - ./apps/api:/app:ro
      - emailstate:/var/lib/loop-email
    depends_on:
      data-init:
        condition: service_completed_successfully
      egress-proxy:
        condition: service_healthy
    networks:
      provider-egress:
    dns:
      - 127.0.0.1
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  calendar-gateway:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    command: ['uvicorn', 'app.provider_gateway.main:app', '--host', '0.0.0.0', '--port', '8090']
    environment:
      PROVIDER_GATEWAY_SERVICE_NAME: calendar-gateway
      PROVIDER_GATEWAY_AUTHORITY_AUDIENCE: loop-calendar-gateway
      PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY: 'true'
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEY: ${AGENT_AUTHORITY_PUBLIC_KEY:-}
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEYS: ${AGENT_AUTHORITY_PUBLIC_KEYS:-{}}
      PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS: 'true'
      PROVIDER_GATEWAY_REVOCATION_DATABASE_PATH: /var/lib/loop-calendar/authority.sqlite3
      PROVIDER_GATEWAY_BROWSER_ENABLED: 'false'
      PROVIDER_GATEWAY_EGRESS_PROXY_URL: http://172.32.0.2:8080
      CALDAV_URL: ${CALDAV_URL:-}
      CALDAV_USER: ${CALDAV_USER:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      CALDAV_CALENDAR: ${CALDAV_CALENDAR:-}
    volumes:
      - ./apps/api:/app:ro
      - calendarstate:/var/lib/loop-calendar
    depends_on:
      data-init:
        condition: service_completed_successfully
      egress-proxy:
        condition: service_healthy
    networks:
      provider-egress:
    dns:
      - 127.0.0.1
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  vision-gateway:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    command: ['uvicorn', 'app.provider_gateway.main:app', '--host', '0.0.0.0', '--port', '8090']
    environment:
      PROVIDER_GATEWAY_SERVICE_NAME: vision-gateway
      PROVIDER_GATEWAY_AUTHORITY_AUDIENCE: loop-vision-gateway
      PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY: 'true'
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEY: ${AGENT_AUTHORITY_PUBLIC_KEY:-}
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEYS: ${AGENT_AUTHORITY_PUBLIC_KEYS:-{}}
      PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS: 'true'
      PROVIDER_GATEWAY_REVOCATION_DATABASE_PATH: /var/lib/loop-vision/authority.sqlite3
      PROVIDER_GATEWAY_BROWSER_ENABLED: 'false'
      PROVIDER_GATEWAY_EGRESS_PROXY_URL: http://172.32.0.2:8080
      PROVIDER_GATEWAY_GEMINI_API_KEY: ${PROVIDER_GATEWAY_GEMINI_API_KEY:-}
    volumes:
      - ./apps/api:/app:ro
      - visionstate:/var/lib/loop-vision
    depends_on:
      data-init:
        condition: service_completed_successfully
      egress-proxy:
        condition: service_healthy
    networks:
      provider-egress:
    dns:
      - 127.0.0.1
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  browser-gateway:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: provider-gateway
    command: ['uvicorn', 'app.provider_gateway.main:app', '--host', '0.0.0.0', '--port', '8090']
    environment:
      PROVIDER_GATEWAY_SERVICE_NAME: browser-gateway
      PROVIDER_GATEWAY_AUTHORITY_AUDIENCE: loop-browser-gateway
      PROVIDER_GATEWAY_REQUIRE_AUTHORITY_KEY: 'true'
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEY: ${AGENT_AUTHORITY_PUBLIC_KEY:-}
      PROVIDER_GATEWAY_AUTHORITY_PUBLIC_KEYS: ${AGENT_AUTHORITY_PUBLIC_KEYS:-{}}
      PROVIDER_GATEWAY_REQUIRE_DURABLE_REVOCATIONS: 'true'
      PROVIDER_GATEWAY_REVOCATION_DATABASE_PATH: /var/lib/loop-browser/authority.sqlite3
      PROVIDER_GATEWAY_BROWSER_ENABLED: 'true'
      PROVIDER_GATEWAY_EGRESS_PROXY_URL: http://172.31.0.2:8080
    volumes:
      - ./apps/api:/app:ro
      - browserstate:/var/lib/loop-browser
    depends_on:
      data-init:
        condition: service_completed_successfully
      egress-proxy:
        condition: service_healthy
    networks:
      browser-egress:
    dns:
      - 127.0.0.1
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  egress-proxy:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    command: ['python', '-m', 'app.egress_proxy']
    environment:
      EGRESS_PROXY_REQUIRE_AUTHORITY_KEY: 'true'
      EGRESS_PROXY_AUTHORITY_PUBLIC_KEY: ${AGENT_AUTHORITY_PUBLIC_KEY:-}
      EGRESS_PROXY_AUTHORITY_PUBLIC_KEYS: ${AGENT_AUTHORITY_PUBLIC_KEYS:-{}}
      EGRESS_PROXY_REQUIRE_DURABLE_AUDIT: 'true'
      EGRESS_PROXY_AUDIT_DATABASE_PATH: /var/lib/loop-egress/audit.sqlite3
      EGRESS_PROXY_REQUIRE_DURABLE_REVOCATIONS: 'true'
      EGRESS_PROXY_REVOCATION_DATABASE_PATH: /var/lib/loop-egress/audit.sqlite3
      EGRESS_PROXY_ALLOWED_PORTS: 80,443,587,993
    volumes:
      - egressaudit:/var/lib/loop-egress
    depends_on:
      data-init:
        condition: service_completed_successfully
    networks:
      default:
      sandbox-egress:
        ipv4_address: 172.30.0.2
      browser-egress:
        ipv4_address: 172.31.0.2
      provider-egress:
        ipv4_address: 172.32.0.2
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/healthz').status==200 else 1)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  sandbox-image:
    image: loop-sandbox:latest
    build:
      context: .
      dockerfile: apps/api/sandbox.Dockerfile
    command: ['true']
    restart: 'no'

  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: dev
    command: ['alembic', 'upgrade', 'head']
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
    volumes:
      - ./apps/api:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '${LOOP_POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${LOOP_REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  loopdata:
  egressaudit:
  emailstate:
  calendarstate:
  visionstate:
  browserstate:

networks:
  sandbox-egress:
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
  browser-egress:
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24
  provider-egress:
    internal: true
    ipam:
      config:
        - subnet: 172.32.0.0/24
