packages:
  - 'apps/web'
  - 'apps/desktop'
  - 'packages/*'

hoistPattern:
  - '*'

peerDependencyRules:
  allowedVersions:
    '@electron/fuses': '2'

overrides:
  '@electron/rebuild': '4.2.0'
  'brace-expansion@<1.1.16': '1.1.16'
  'brace-expansion@>=3.0.0 <5.0.7': '5.0.7'
  esbuild: '0.28.1'
  postcss: '8.5.19'
  tmp: '0.2.7'

allowBuilds:
  electron-winstaller: true
  esbuild: true
  sharp: true
  unrs-resolver: true
